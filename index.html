<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Code Fast-Pass</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #334155;
            background-color: var(--card-bg);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            padding: 0 25px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: #0f172a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #334155;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .copy-btn {
            background-color: #334155;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .copy-btn:hover {
            background-color: #475569;
        }

        pre {
            background-color: #090d16;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #1e293b;
        }

        .error-msg {
            color: #f87171;
            text-align: center;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ Lab Code Hub</h1>
        <p style="color: var(--text-muted)">Type the experiment number to grab your code.</p>
    </header>

    <div class="search-box">
        <input type="text" id="expInput" placeholder="Enter Experiment Number (e.g., 1, 2, 3)..." onkeypress="handleKeyPress(event)">
        <button onclick="findCode()">Get Code</button>
    </div>

    <div id="error" class="error-msg">Experiment not found. Double-check the number!</div>

    <div id="resultCard" class="result-card">
        <div class="result-header">
            <span id="expTitle" class="result-title">Experiment X</span>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy Code</button>
        </div>
        <pre><code id="codeArea"></code></pre>
    </div>
</div>

<script>
    // --- UPLOAD YOUR CODES HERE ---
    const labDatabase = {// --- UPLOAD YOUR CODES HERE ---
    const labDatabase = {
        "1": {
            title: "Experiment 1: Evidence-Based Reasoning (Weather Planner)",
            code: `def evidence_based_reasoning(temperature, is_raining):
    if temperature >= 25 and not is_raining:
        return "It's a great day! Go for a walk."
    elif temperature >= 20 and not is_raining:
        return "It's a nice day. You can go for a walk."
    elif is_raining:
        return "It's raining. Better stay indoors."
    else:
        return "The weather doesn't seem suitable for a walk. Stay indoors."


def main():
    try:
        temperature = float(input("Enter the current temperature in Celsius: "))
        is_raining_input = input("Is it raining? (yes/no): ")
        is_raining = is_raining_input.lower() == "yes"

        result = evidence_based_reasoning(temperature, is_raining)
        print(result)

    except ValueError:
        print("Please enter a valid temperature in Celsius.")


if __name__ == "__main__":
    main()`
        }
    };
    };

    function findCode() {
        const query = document.getElementById('expInput').value.trim();
        const resultCard = document.getElementById('resultCard');
        const errorDiv = document.getElementById('error');
        const copyBtn = document.getElementById('copyBtn');

        if (labDatabase[query]) {
            errorDiv.style.display = 'none';
            document.getElementById('expTitle').innerText = labDatabase[query].title;
            document.getElementById('codeArea').innerText = labDatabase[query].code;
            resultCard.style.display = 'block';
            copyBtn.innerText = "Copy Code"; 
        } else {
            resultCard.style.display = 'none';
            errorDiv.style.display = 'block';
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            findCode();
        }
    }

    function copyToClipboard() {
        const codeText = document.getElementById('codeArea').innerText;
        const copyBtn = document.getElementById('copyBtn');
        
        navigator.clipboard.writeText(codeText).then(() => {
            copyBtn.innerText = "Copied! ✓";
            setTimeout(() => {
                copyBtn.innerText = "Copy Code";
            }, 2000);
        }).catch(err => {
            alert("Oops, unable to copy automatically. Please select all and copy manually!");
        });
    }
</script>

</body>
</html>
