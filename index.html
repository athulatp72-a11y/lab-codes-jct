<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Code Fast-Pass</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #334155;
            background-color: var(--card-bg);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            padding: 0 25px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-color);
            color: #0f172a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .result-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #334155;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .result-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .copy-btn {
            background-color: #334155;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .copy-btn:hover {
            background-color: #475569;
        }

        pre {
            background-color: #090d16;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #1e293b;
        }

        .error-msg {
            color: #f87171;
            text-align: center;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ Lab Code Hub</h1>
        <p style="color: var(--text-muted)">Type the experiment number to grab your code (e.g., 1a, 1b, 2, 3a, 3b...).</p>
    </header>

    <div class="search-box">
        <input type="text" id="expInput" placeholder="Enter Experiment Number (e.g., 1a, 1b, 2, 3a)..." onkeypress="handleKeyPress(event)">
        <button onclick="findCode()">Get Code</button>
    </div>

    <div id="error" class="error-msg">Experiment not found. Double-check the number! (Try adding 'a' or 'b' if applicable)</div>

    <div id="resultCard" class="result-card">
        <div class="result-header">
            <span id="expTitle" class="result-title">Experiment X</span>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy Code</button>
        </div>
        <pre><code id="codeArea"></code></pre>
    </div>
</div>

        "6a": {
            title: "Experiment 6(a): Model Evaluation Metrics (Iris Confusion Matrix)",
            code: # Sample Iris-like dataset
X = [
    [5.1, 3.5],
    [4.9, 3.0],
    [6.2, 3.4],
    [6.7, 3.1],
    [5.5, 2.4]
]

y = ["Setosa", "Setosa", "Versicolor", "Virginica", "Versicolor"]

# Split data manually
X_train = X[:4]
y_train = y[:4]

X_test = X[4:]
y_test = y[4:]

# Simple rule-based classifier
def predict(sample):
    if sample[0] < 5.5:
        return "Setosa"
    elif sample[0] < 6.5:
        return "Versicolor"
    else:
        return "Virginica"

# Make predictions
predictions = []
for sample in X_test:
    predictions.append(predict(sample))

# Confusion Matrix
labels = ["Setosa", "Versicolor", "Virginica"]
matrix = [[0] * 3 for _ in range(3)]

for actual, predicted in zip(y_test, predictions):
    i = labels.index(actual)
    j = labels.index(predicted)
    matrix[i][j] += 1

print("Confusion Matrix:")
for row in matrix:
    print(row)

# Accuracy
correct = sum(1 for a, p in zip(y_test, predictions) if a == p)
accuracy = correct / len(y_test)

print("\nAccuracy:", accuracy)

# Simple Classification Report
print("\nClassification Report")
for label in labels:
    tp = sum(1 for a, p in zip(y_test, predictions) if a == label and p == label)
    fp = sum(1 for a, p in zip(y_test, predictions) if a != label and p == label)
    fn = sum(1 for a, p in zip(y_test, predictions) if a == label and p != label)

    precision = tp / (tp + fp) if (tp + fp) > 0 else 0
    recall = tp / (tp + fn) if (tp + fn) > 0 else 0

    print(f"{label}:")
    print(f"  Precision: {precision:.2f}")
    print(f"  Recall: {recall:.2f}")
    }
