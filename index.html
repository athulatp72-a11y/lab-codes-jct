            color: #0f172a;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;

            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #334155;
            display: none;
        }

        .result-header {
            display: flex;

            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .result-title {

            font-weight: bold;
            color: var(--accent-color);

        .copy-btn {
            background-color: #334155;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .copy-btn:hover {
            background-color: #475569;
        }

        pre {

            border-radius: 6px;

            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #1e293b;

            color: #f87171;
            text-align: center;
            display: none;
            margin-top: 15px;
        }

        /* Hidden textarea helper to support copying on local file:/// access */
        #fallbackClipboardArea {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
        }
    </style>
</head>

    function findCode() {
        const query = document.getElementById('expInput').value.trim().toLowerCase();
        const resultCard = document.getElementById('resultCard');
        const errorDiv = document.getElementById('error');
        const copyBtn = document.getElementById('copyBtn');

        if (labDatabase[query]) {
            errorDiv.style.display = 'none';
            document.getElementById('expTitle').innerText = labDatabase[query].title;
            document.getElementById('codeArea').innerText = labDatabase[query].code;
            resultCard.style.display = 'block';
            copyBtn.innerText = "Copy Code"; 
        } else {
            resultCard.style.display = 'none';
            errorDiv.style.display = 'block';
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            findCode();
        }
    }

    function copyToClipboard() {
        const codeText = document.getElementById('codeArea').innerText;
        const copyBtn = document.getElementById('copyBtn');

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(codeText).then(() => {
                showSuccessState(copyBtn);
            }).catch(() => {
                fallbackCopy(codeText, copyBtn);
            });
        } else {
            fallbackCopy(codeText, copyBtn);
        }
    }

    function fallbackCopy(text, button) {
        const fallbackTextarea = document.getElementById('fallbackClipboardArea');
        fallbackTextarea.value = text;
        fallbackTextarea.focus();
        fallbackTextarea.select();
        fallbackTextarea.setSelectionRange(0, 99999);

        try {
            document.execCommand('copy');
            showSuccessState(button);
        } catch (err) {
            alert("Oops, unable to copy automatically. Please manually select the code text and copy!");
        }
    }

    function showSuccessState(button) {
        button.innerText = "Copied! ✓";
        setTimeout(() => {
            button.innerText = "Copy Code";
        }, 2000);
    }
